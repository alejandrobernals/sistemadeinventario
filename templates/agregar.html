<!DOCTYPE html>
<html>
<head>
    <title>Agregar Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Agregar Producto</h2>

<form method="POST">
    <input type="text" name="nombre" class="form-control mb-2" placeholder="Nombre" required>
    <input type="number" name="cantidad" class="form-control mb-2" placeholder="Cantidad" required>
    <input type="date" name="fecha_vencimiento" class="form-control mb-2" required>
    <button class="btn btn-success">Guardar</button>
    <a href="/productos" class="btn btn-secondary">Volver</a>
</form>

</body>
</html>
