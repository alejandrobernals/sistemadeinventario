<!DOCTYPE html>
<html>
<head>
    <title>Nueva Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #0f172a;
            color: white;
        }

        h2 {
            font-weight: bold;
        }

        .container-box {
            background: #020617;
            padding: 20px;
            border-radius: 15px;
        }

        .btn-custom {
            background: #2563eb;
            border: none;
        }

        .btn-custom:hover {
            background: #1d4ed8;
        }

        table {
            background: #020617;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #1e293b;
            color: #60a5fa;
            text-align: center;
        }

        td {
            text-align: center;
            vertical-align: middle;
        }

        tr {
            border-bottom: 1px solid #1f2937;
        }

        tr:hover {
            background: rgba(59,130,246,0.1);
        }

        .btn-warning {
            background: #f59e0b;
            border: none;
        }

        .btn-danger {
            background: #ef4444;
            border: none;
        }
    </style>
</head>
<body class="container mt-4">

<h2>Nueva Venta</h2>

<form method="POST">
    <select name="producto_id" class="form-control mb-2">
        {% for p in productos %}
            <option value="{{ p.id }}">{{ p.nombre }} (Stock: {{ p.cantidad }})</option>
        {% endfor %}
    </select>

    <input type="number" name="cantidad" class="form-control mb-2" placeholder="Cantidad" required>

    <button class="btn btn-success">Vender</button>
    <a href="/ventas" class="btn btn-secondary">Volver</a>
</form>

</body>
</html>
